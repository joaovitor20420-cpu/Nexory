<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="overflow: visible;">
  <defs>
    <!-- Background Halo -->
    <radialGradient id="dash-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(123, 46, 255, 0.4)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
    
    <!-- Gradients -->
    <linearGradient id="bar-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7B2EFF" />
      <stop offset="100%" stop-color="#28D8FC" />
    </linearGradient>

    <linearGradient id="panel-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(32, 31, 31, 0.85)" />
      <stop offset="100%" stop-color="rgba(15, 14, 18, 0.95)" />
    </linearGradient>
    
    <filter id="dash-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="dash-dropshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="10" dy="25" stdDeviation="20" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="400" cy="250" r="300" fill="url(#dash-halo)" />

  <!-- Main Application Window -->
  <g filter="url(#dash-dropshadow)">
    <!-- Window Body -->
    <rect x="50" y="50" width="700" height="400" rx="20" fill="url(#panel-bg)" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
    
    <!-- Window Header/Mac Buttons -->
    <circle cx="80" cy="80" r="6" fill="#FF5F56" />
    <circle cx="100" cy="80" r="6" fill="#FFBD2E" />
    <circle cx="120" cy="80" r="6" fill="#27C93F" />
    <rect x="50" y="100" width="700" height="1" fill="rgba(255,255,255,0.1)" />

    <!-- Sidebar Layout -->
    <rect x="50" y="101" width="180" height="349" fill="rgba(255,255,255,0.03)" />
    <rect x="80" y="130" width="120" height="15" rx="7" fill="rgba(255,255,255,0.2)" />
    <rect x="80" y="160" width="100" height="10" rx="5" fill="rgba(255,255,255,0.1)" />
    <rect x="80" y="180" width="80" height="10" rx="5" fill="rgba(255,255,255,0.1)" />
    <rect x="80" y="200" width="110" height="10" rx="5" fill="rgba(255,255,255,0.1)" />
    <rect x="80" y="220" width="90" height="10" rx="5" fill="rgba(255,255,255,0.1)" />

    <!-- Main Content Area: Graphs -->
    <!-- Title Skeleton-->
    <rect x="270" y="130" width="200" height="20" rx="10" fill="#FFF" opacity="0.9"/>
    
    <!-- Bar Chart (representing solving bottlenecks) -->
    <!-- Grid horizontal lines -->
    <rect x="270" y="200" width="440" height="1" fill="rgba(255,255,255,0.05)" />
    <rect x="270" y="260" width="440" height="1" fill="rgba(255,255,255,0.05)" />
    <rect x="270" y="320" width="440" height="1" fill="rgba(255,255,255,0.05)" />
    <rect x="270" y="380" width="440" height="1" fill="rgba(255,255,255,0.1)" />
    
    <!-- Animated-looking Bars -->
    <!-- Left bar (Slow system bottleneck, coral pink) -->
    <rect x="300" y="300" width="40" height="80" rx="5" fill="#FFB0CD" />
    
    <!-- Fast scaling bars (Nexory power) -->
    <rect x="370" y="250" width="40" height="130" rx="5" fill="url(#bar-grad)" opacity="0.5"/>
    <rect x="440" y="180" width="40" height="200" rx="5" fill="url(#bar-grad)" opacity="0.8"/>
    <rect x="510" y="130" width="40" height="250" rx="5" fill="url(#bar-grad)" filter="url(#dash-glow)"/>
    
    <!-- Neon Trend Line (Scaling) -->
    <path d="M 320 290 Q 380 270 440 160 T 630 -10" fill="none" stroke="#28D8FC" stroke-width="6" stroke-linecap="round" filter="url(#dash-glow)" />
    <circle cx="320" cy="290" r="5" fill="#FFF" />
    
    <!-- Arrow at the peak -->
    <!-- Breaking out of the panel -->
    <polygon points="610,-5 640,-35 650,20" fill="#FFF" filter="url(#dash-glow)" />
    <circle cx="630" cy="-10" r="10" fill="#FFF" filter="url(#dash-glow)"/>
  </g>
  
  <!-- Floating Dashboard Widgets mapping to "Processos Manuais", "Sistemas", "Integrações" -->
  <g filter="url(#dash-dropshadow)">
    <!-- Small floating card for "Performance Uptime" -->
    <rect x="620" y="270" width="160" height="100" rx="15" fill="rgba(40, 216, 252, 0.15)" stroke="#28D8FC" stroke-width="2" />
    <path d="M 640 330 L 660 330 L 680 300 L 700 340 L 720 290 L 750 290" fill="none" stroke="#28D8FC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#dash-glow)"/>
    <circle cx="750" cy="290" r="5" fill="#FFF" filter="url(#dash-glow)"/>
  </g>

  <g filter="url(#dash-dropshadow)">
    <!-- Small floating card for "Segurança/Automation" (Gears/Core) -->
    <rect x="-10" y="150" width="140" height="120" rx="15" fill="rgba(123, 46, 255, 0.2)" stroke="#7B2EFF" stroke-width="2" />
    <circle cx="60" cy="210" r="30" fill="none" stroke="#7B2EFF" stroke-width="6" stroke-dasharray="15 15" filter="url(#dash-glow)"/>
    <circle cx="60" cy="210" r="10" fill="#FFF" filter="url(#dash-glow)"/>
  </g>

</svg>
