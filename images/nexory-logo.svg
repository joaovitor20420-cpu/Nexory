<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <!-- Background Halo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(123, 46, 255, 0.45)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </radialGradient>
    
    <!-- Gradients for N -->
    <linearGradient id="left-stem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#28D8FC" />
      <stop offset="100%" stop-color="#7B2EFF" />
    </linearGradient>
    
    <linearGradient id="right-stem" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFB0CD" />
      <stop offset="100%" stop-color="#7B2EFF" />
    </linearGradient>

    <!-- Diagonal cross gradient (Glassmorphic mix) -->
    <linearGradient id="diagonal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2EFF" />
      <stop offset="50%" stop-color="rgba(123, 46, 255, 0.5)" />
      <stop offset="100%" stop-color="#28D8FC" />
    </linearGradient>
    
    <!-- Drop Shadow for 3D depth of stems -->
    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="15" dy="25" stdDeviation="15" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="300" cy="300" r="280" fill="url(#halo)" />

  <!-- Outer Tech Orbits -->
  <g opacity="0.8">
    <circle cx="300" cy="300" r="240" stroke="rgba(40, 216, 252, 0.3)" stroke-width="2" fill="none" stroke-dasharray="8 16" transform="rotate(30 300 300)"/>
    <circle cx="300" cy="300" r="270" stroke="rgba(255, 176, 205, 0.2)" stroke-width="1.5" fill="none" stroke-dasharray="25 40 5 15" transform="rotate(-45 300 300)"/>
    <path d="M 300 20 A 280 280 0 0 1 580 300" stroke="#7B2EFF" stroke-width="3" fill="none" stroke-linecap="round" />
    <circle cx="580" cy="300" r="6" fill="#28D8FC" />
    <circle cx="300" cy="20" r="6" fill="#FFB0CD" />
  </g>

  <!-- The "N" monogram group -->
  <g filter="url(#dropshadow)">
    <!-- Right Stem -->
    <rect x="370" y="150" width="50" height="300" rx="20" fill="url(#right-stem)" />
    
    <!-- Left Stem -->
    <rect x="180" y="150" width="50" height="300" rx="20" fill="url(#left-stem)" />
    
    <!-- Diagonal cross -->
    <!-- From Left Stem Top (180,150 -> 230,150) to Right Stem Bottom (370, 450 -> 420, 450) -->
    <!-- Connecting points properly -->
    <path d="M 210 160 L 230 150 L 390 440 L 370 450 Z" fill="url(#diagonal)" />
  </g>
  
  <text x="300" y="540" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="42" fill="white" text-anchor="middle" letter-spacing="18">NEXORY</text>
  <text x="300" y="570" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="6">DIGITAL COCKPITS</text>
</svg>
