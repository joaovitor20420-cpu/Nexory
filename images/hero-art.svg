<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2EFF" />
      <stop offset="100%" stop-color="#FF2E9F" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#007084" />
      <stop offset="100%" stop-color="#28D8FC" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B1525" />
      <stop offset="100%" stop-color="#0F0C12" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="neonGlowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#28D8FC" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Abstract Base/Backdrop -->
  <rect x="0" y="0" width="800" height="600" rx="30" fill="url(#bgGrad)" stroke="#302B3E" stroke-width="2"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="0" y1="500" x2="800" y2="500" />
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="400" y1="0" x2="400" y2="600" />
    <line x1="500" y1="0" x2="500" y2="600" />
    <line x1="600" y1="0" x2="600" y2="600" />
    <line x1="700" y1="0" x2="700" y2="600" />
  </g>

  <!-- Giant Glowing Spheres in Background -->
  <circle cx="650" cy="150" r="140" fill="url(#primaryGrad)" opacity="0.3" filter="url(#neonGlow)"/>
  <circle cx="150" cy="450" r="110" fill="url(#cyanGrad)" opacity="0.2" filter="url(#neonGlow)"/>

  <!-- Main Dashboard Glass Panel -->
  <rect x="150" y="100" width="500" height="400" rx="16" fill="url(#glassGrad)" stroke="rgba(123, 46, 255, 0.4)" stroke-width="1.5" />

  <!-- Dashboard Header -->
  <rect x="150" y="100" width="500" height="45" rx="16" fill="rgba(0,0,0,0.4)" />
  <circle cx="180" cy="122.5" r="5" fill="#FF5F56" />
  <circle cx="195" cy="122.5" r="5" fill="#FFBD2E" />
  <circle cx="210" cy="122.5" r="5" fill="#27C93F" />
  <text x="400" y="128" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="14" fill="#E5E2E1" text-anchor="middle" letter-spacing="2">NEXORY ENGINE</text>

  <!-- Left Sidebar inside panel -->
  <rect x="175" y="165" width="115" height="310" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" />
  <rect x="190" y="185" width="85" height="15" rx="4" fill="url(#primaryGrad)"/>
  <rect x="190" y="215" width="60" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
  <rect x="190" y="235" width="70" height="8" rx="4" fill="rgba(255,255,255,0.1)" />
  <rect x="190" y="255" width="50" height="8" rx="4" fill="rgba(255,255,255,0.1)" />

  <g transform="translate(232, 370)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#cyanGrad)" stroke-width="6" stroke-dasharray="140 60" filter="url(#neonGlowCyan)" transform="rotate(-90)"/>
    <text x="-1" y="6" font-family="'Space Grotesk', sans-serif" font-size="18" fill="#fff" font-weight="bold" text-anchor="middle">99</text>
  </g>

  <!-- Main Content Area Charts -->
  <rect x="310" y="165" width="310" height="180" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)"/>
  
  <!-- Line Chart / Wave -->
  <path d="M 330 300 Q 370 200, 420 280 T 520 210 T 600 240" fill="none" stroke="url(#primaryGrad)" stroke-width="4" filter="url(#neonGlow)"/>
  <!-- Area fill under the wave -->
  <path d="M 330 300 Q 370 200, 420 280 T 520 210 T 600 240 L 600 345 L 330 345 Z" fill="url(#primaryGrad)" opacity="0.1" />

  <!-- Data Nodes on Line -->
  <circle cx="420" cy="280" r="5" fill="#FFF" stroke="#FF2E9F" stroke-width="3"/>
  <circle cx="520" cy="210" r="5" fill="#FFF" stroke="#7B2EFF" stroke-width="3"/>

  <!-- Bottom stat cards -->
  <rect x="310" y="365" width="145" height="110" rx="10" fill="rgba(255,255,255,0.03)" stroke="url(#cyanGrad)" stroke-width="1.5"/>
  <text x="330" y="405" font-family="'Manrope', sans-serif" font-size="11" font-weight="600" fill="#CCC3D9">CONVERSION LIFT</text>
  <text x="330" y="445" font-family="'Space Grotesk', sans-serif" font-size="34" font-weight="700" fill="#28D8FC" filter="url(#neonGlowCyan)">+37%</text>

  <rect x="475" y="365" width="145" height="110" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)"/>
  <text x="495" y="405" font-family="'Manrope', sans-serif" font-size="11" font-weight="600" fill="#CCC3D9">UPTIME STATUS</text>
  <text x="495" y="445" font-family="'Space Grotesk', sans-serif" font-size="34" font-weight="700" fill="#FFF">100%</text>

</svg>
